name: Deploy Frontend to Firebase

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project my-agentic-lab
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
