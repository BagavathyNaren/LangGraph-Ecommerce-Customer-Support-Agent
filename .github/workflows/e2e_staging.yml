name: E2E Staging Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Deploy Frontend to Firebase Staging
        run: npx firebase-tools deploy --only hosting --project my-agentic-lab --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Install Playwright and dependencies
        run: |
          npm install @playwright/test
          npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_TEST_URL: 'https://my-agentic-lab.web.app'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 10
