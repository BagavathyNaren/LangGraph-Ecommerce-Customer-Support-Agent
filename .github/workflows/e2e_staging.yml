name: E2E Staging Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install
      - name: Install Playwright and dependencies
        run: |
          npm install @playwright/test
          npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test --reporter=list 2>&1 | tee playwright_output.txt

      - name: Output Playwright Results
        if: always()
        run: cat playwright_output.txt

      - name: Comment Commit with E2E test output
        uses: actions/github-script@v6
        if: always()
        with:
          script: |
            const fs = require('fs');
            let log = 'No log found';
            if (fs.existsSync('playwright_output.txt')) {
                log = fs.readFileSync('playwright_output.txt', 'utf8');
                if (log.length > 60000) { log = log.substring(log.length - 60000); }
            }
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '### E2E Test Output\n```text\n' + log + '\n```'
            })

