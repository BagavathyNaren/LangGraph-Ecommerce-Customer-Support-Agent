name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-format:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

  test:
    name: Backend Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install core dependencies for unit tests
        run: |
          python -m pip install --upgrade pip
          pip install \
            langgraph>=0.2.70 \
            langchain-core>=1.2.22 \
            langchain-openai>=0.3.0 \
            langchain-anthropic>=0.3.0 \
            psycopg2-binary>=2.9.9 \
            "psycopg[binary]>=3.2.0" \
            psycopg-pool>=3.2.0 \
            langgraph-checkpoint-postgres>=2.0.0 \
            python-dotenv>=1.0.0 \
            pydantic>=2.7.0 \
            requests>=2.31.0 \
            pytest

      - name: Run unit tests
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          OPENAI_API_KEY: "sk-dummy-key-for-testing"
          TAVILY_API_KEY: "tvly-dummy-key"
          SERPER_API_KEY: "serper-dummy-key"
        run: |
          python -m pytest tests/test_nodes.py tests/test_real_tools.py -v
