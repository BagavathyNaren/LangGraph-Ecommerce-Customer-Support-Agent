name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-and-format:
    name: Ruff Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check . > ruff_output.log || true

      - name: Show Ruff linter output on failure
        if: always()
        run: |
          cat ruff_output.log

      - name: Comment PR with Ruff output
        uses: actions/github-script@v6
        if: always()
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('ruff_output.log')) {
                const log = fs.readFileSync('ruff_output.log', 'utf8');
                if (log.includes('Found')) {
                    await github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: '### Ruff Lint Failure Log\n```text\n' + log + '\n```'
                    });
                    process.exit(1);
                }
            }

      - name: Run Ruff format check
        run: ruff format --check .

  test:
    name: Backend Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install core dependencies for unit tests
        run: |
          python -m pip install --upgrade pip
          pip install \
            "langgraph>=0.2.70" \
            "langchain-core>=1.2.22" \
            "langchain-openai>=0.3.0" \
            "langchain-anthropic>=0.3.0" \
            "psycopg2-binary>=2.9.9" \
            "psycopg[binary]>=3.2.0" \
            "psycopg_pool>=3.2.0" \
            "python-dotenv>=1.0.0" \
            "pydantic>=2.7.0" \
            "requests>=2.31.0" \
            pytest \
            pytest-asyncio

      - name: Collect tests (diagnose import errors)
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          OPENAI_API_KEY: "sk-dummy-key-for-testing"
          TAVILY_API_KEY: "tvly-dummy-key"
          SERPER_API_KEY: "serper-dummy-key"
        run: |
          python -m pytest tests/test_nodes.py tests/test_real_tools.py --collect-only 2>&1 || true

      - name: Run unit tests
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          OPENAI_API_KEY: "sk-dummy-key-for-testing"
          TAVILY_API_KEY: "tvly-dummy-key"
          SERPER_API_KEY: "serper-dummy-key"
        run: |
          python -m pytest tests/test_nodes.py tests/test_real_tools.py -v --tb=short

      - name: Comment PR with test output
        uses: actions/github-script@v6
        if: failure()
        with:
          script: |
            const fs = require('fs');
            let log = 'No log found';
            if (fs.existsSync('test_output.log')) {
                log = fs.readFileSync('test_output.log', 'utf8');
                if (log.length > 60000) { log = log.substring(log.length - 60000); }
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Ubuntu Test Failure Log\n```text\n' + log + '\n```'
            })

