<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Commerce Support Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-container { width: 100%; max-width: 700px; height: 90vh; background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { background: #1a73e8; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .chat-header .avatar { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .chat-header h2 { font-size: 16px; }
    .chat-header p { font-size: 12px; opacity: 0.85; }
    .thread-bar { padding: 8px 20px; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; font-size: 12px; color: #5f6368; display: flex; justify-content: space-between; align-items: center; }
    .thread-bar span { font-weight: 600; color: #1a73e8; }
    .thread-bar button { background: none; border: none; color: #1a73e8; cursor: pointer; font-size: 12px; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .message-row { display: flex; flex-direction: column; }
    .message-row.user { align-items: flex-end; }
    .message-row.agent { align-items: flex-start; }
    .bubble { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
    .message-row.user .bubble { background: #1a73e8; color: white; border-bottom-right-radius: 4px; }
    .message-row.agent .bubble { background: #f1f3f4; color: #202124; border-bottom-left-radius: 4px; }
    .bubble.escalated { background: #fce8e6; color: #c5221f; border-left: 4px solid #ea4335; border-bottom-left-radius: 4px; }
    .badge-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .badge.escalated { background: #fce8e6; color: #c5221f; }
    .badge.intent { background: #e8f0fe; color: #1a73e8; }
    .badge.order { background: #e6f4ea; color: #137333; }
    .badge.cache { background: #fef7e0; color: #b06000; }
    .timestamp { font-size: 10px; color: #9aa0a6; margin-top: 4px; }
    .chat-input { padding: 16px; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
    .chat-input input { flex: 1; padding: 10px 16px; border: 1px solid #dadce0; border-radius: 24px; font-size: 14px; outline: none; }
    .chat-input input:focus { border-color: #1a73e8; }
    .chat-input button { background: #1a73e8; color: white; border: none; border-radius: 24px; padding: 10px 24px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .chat-input button:disabled { background: #dadce0; cursor: not-allowed; }
    .cursor { display: inline-block; width: 8px; height: 14px; background: #444; margin-left: 2px; animation: blink 0.8s infinite; vertical-align: middle; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🛒</div>
    <div>
      <h2>E-Commerce Support Agent</h2>
      <p>Powered by LangGraph + Claude Haiku 4.5 + GPT-4o-mini</p>
    </div>
  </div>
  <div class="thread-bar">
    <span>Session: <span id="thread-id"></span></span>
    <button onclick="newSession()">+ New Session</button>
  </div>
  <div class="chat-messages" id="messages">
    <div class="message-row agent">
      <div class="bubble">Hi! I'm your e-commerce support agent. Ask me about order status, returns, refunds, or cancellations.</div>
    </div>
  </div>
  <div class="chat-input">
    <input type="text" id="user-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()"/>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  let threadId = generateId();
  let currentController = null;
  document.getElementById('thread-id').textContent = threadId;

  function generateId() {
    return 'thread-' + Math.random().toString(36).substr(2, 9);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderMarkdown(text) {
    // Escape HTML first for safety, then convert markdown to HTML
    let html = escapeHtml(text);
    // Bold: **text** → <strong>text</strong>
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Numbered list items: "1. text" at start of line → formatted list item
    html = html.replace(/^(\d+)\.\s+/gm, '<br><strong>$1.</strong> ');
    // Line breaks
    html = html.replace(/\n/g, '<br>');
    // Clean up leading <br>
    html = html.replace(/^(<br>)+/, '');
    return html;
  }

  function newSession() {
    threadId = generateId();
    document.getElementById('thread-id').textContent = threadId;
    document.getElementById('messages').innerHTML = `
      <div class="message-row agent">
        <div class="bubble">Hi! I'm your e-commerce support agent. Ask me about order status, returns, refunds, or cancellations.</div>
      </div>`;
  }

  function now() {
    return new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const messages = document.getElementById('messages');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    btn.disabled = true;

    // User bubble — escape to prevent XSS
    messages.innerHTML += `
      <div class="message-row user">
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="timestamp">${now()}</div>
      </div>`;

    // Agent bubble placeholder
    const row = document.createElement('div');
    row.className = 'message-row agent';
    row.id = 'streaming-row';
    row.innerHTML = '<div class="bubble" id="streaming-bubble"><span class="cursor"></span></div>';
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;

    let fullText = '';
    let metadata = {};

    try {
      if (currentController) currentController.abort();
      currentController = new AbortController();
      const response = await fetch('/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, thread_id: threadId }),
        signal: currentController.signal
      });

      // Handle HTTP errors (400 blocked, 422 validation, 500 crash, etc.)
      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        // Pydantic 422 returns detail as array of objects; HTTPException returns string
        if (Array.isArray(errorData.detail)) {
          fullText = errorData.detail.map(e => e.msg || e.message || JSON.stringify(e)).join('. ');
        } else {
          fullText = errorData.detail || `Request failed (${response.status}). Please try again.`;
        }
      } else {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const lines = decoder.decode(value).split('\n\n');
          for (const line of lines) {
            const trimmed = line.trim();
            if (trimmed.startsWith('data: ')) {
              try {
                const data = JSON.parse(trimmed.slice(6));
                if (data.token) {
                  fullText += data.token;
                  document.getElementById('streaming-bubble').innerHTML = renderMarkdown(fullText) + '<span class="cursor"></span>';
                  messages.scrollTop = messages.scrollHeight;
                }
                if (data.done) {
                  metadata = data;
                }
              } catch(e) {}
            }
          }
        }
      }
    } catch(e) {
      if (e.name !== 'AbortError') {
        fullText = 'Connection error. Please try again.';
      }
    }

    // Finalize bubble
    if (!fullText || fullText.trim() === '') {
      fullText = 'Sorry, I could not process your request. Please try asking about an order status, return, refund, or cancellation.';
    }
    const bubble = document.getElementById('streaming-bubble');
    const isEscalated = metadata.escalated === true;
    if (bubble) bubble.className = isEscalated ? 'bubble escalated' : 'bubble';
    if (bubble) bubble.innerHTML = renderMarkdown(fullText);
    if (bubble) bubble.removeAttribute('id');
    // Build badges
    const badges = [];
    if (isEscalated) badges.push('<span class="badge escalated">🚨 Escalated</span>');
    if (metadata.intent && metadata.intent !== 'unclear') badges.push(`<span class="badge intent">${metadata.intent.replace('_', ' ')}</span>`);
    if (metadata.intent && metadata.intent !== 'unclear' && metadata.order_id && metadata.order_id !== 'null') badges.push(`<span class="badge order">📦 ${metadata.order_id}</span>`);
    if (metadata.cache_hit) badges.push('<span class="badge cache">⚡ Cached</span>');

    row.id = '';
    row.innerHTML += `
      ${badges.length ? `<div class="badge-row">${badges.join('')}</div>` : ''}
      <div class="timestamp">${now()}</div>`;

    btn.disabled = false;
    messages.scrollTop = messages.scrollHeight;
    input.focus();
  }
</script>
</body>
</html>
