<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agentic Support | AI Store</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    [x-cloak] { display: none !important; }
    
    .glass {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .message-glow {
      box-shadow: 0 0 20px -5px rgba(79, 70, 229, 0.2);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: currentColor;
      margin-left: 2px;
      animation: blink 0.8s infinite;
      vertical-align: middle;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4 md:p-8 overflow-hidden" 
      x-data="chatApp()" x-init="init()">

  <!-- Main App Container -->
  <div class="relative w-full max-w-5xl h-[85vh] flex gap-6">
    
    <!-- Chat Section -->
    <div class="flex-1 glass rounded-3xl overflow-hidden flex flex-direction-col flex-col relative shadow-2xl">
      
      <!-- Header -->
      <header class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
            <i data-lucide="bot" class="text-white w-6 h-6"></i>
          </div>
          <div>
            <h1 class="text-lg font-bold tracking-tight">AI Store Support</h1>
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
              <span class="text-xs text-slate-400 font-medium uppercase tracking-wider">Agent Online</span>
            </div>
          </div>
        </div>
        
        <div class="flex items-center gap-2">
          <button @click="newSession()" class="p-2 hover:bg-white/10 rounded-lg transition-colors group relative" title="New Session">
            <i data-lucide="refresh-cw" class="w-5 h-5 text-slate-400 group-hover:text-indigo-400 transition-colors"></i>
          </button>
          <button @click="drawerOpen = !drawerOpen" class="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 rounded-xl border border-white/10 transition-all">
            <i data-lucide="sidebar" class="w-4 h-4 text-indigo-400"></i>
            <span class="text-sm font-semibold">Details</span>
          </button>
        </div>
      </header>

      <!-- Messages Area -->
      <main class="flex-1 overflow-y-auto p-6 space-y-6" id="messages-container" x-ref="messagesBox">
        <template x-for="(msg, index) in messages" :key="index">
          <div :class="msg.role === 'user' ? 'flex flex-col items-end' : 'flex flex-col items-start'">
            
            <!-- Message Bubble -->
            <div :class="[
              'max-w-[85%] md:max-w-[70%] p-4 rounded-2xl text-sm leading-relaxed transition-all duration-300',
              msg.role === 'user' 
                ? 'bg-indigo-600 text-white rounded-tr-none shadow-lg shadow-indigo-900/20' 
                : 'bg-white/5 border border-white/10 text-slate-200 rounded-tl-none',
              msg.isEscalated ? 'border-l-4 border-l-rose-500 bg-rose-500/5' : ''
            ]" x-transition>
              
              <div x-html="renderMarkdown(msg.content)"></div>
              <span x-show="msg.streaming" class="cursor-blink"></span>
              
              <!-- Badges -->
              <div x-show="msg.metadata" class="flex flex-wrap gap-2 mt-3">
                <template x-if="msg.metadata?.intent && msg.metadata.intent !== 'unclear'">
                  <span class="px-2 py-0.5 rounded-full bg-white/10 text-[10px] font-bold uppercase tracking-widest text-indigo-300 border border-white/10" x-text="msg.metadata.intent.replace('_', ' ')"></span>
                </template>
                <template x-if="msg.metadata?.order_id">
                  <span class="px-2 py-0.5 rounded-full bg-emerald-500/10 text-[10px] font-bold uppercase tracking-widest text-emerald-400 border border-emerald-500/20" x-text="'📦 ' + msg.metadata.order_id"></span>
                </template>
                <template x-if="msg.metadata?.cache_hit">
                  <span class="px-2 py-0.5 rounded-full bg-amber-500/10 text-[10px] font-bold uppercase tracking-widest text-amber-400 border border-amber-500/20">⚡ Cached</span>
                </template>
              </div>
            </div>
            
            <!-- Timestamp -->
            <span class="text-[10px] text-slate-500 mt-1 px-1 font-medium" x-text="msg.timestamp"></span>
          </div>
        </template>
      </main>

      <!-- Input Area -->
      <footer class="p-6 bg-slate-900/30 backdrop-blur-md border-t border-white/5">
        <div class="relative group">
          <input 
            type="text" 
            x-model="userInput"
            @keydown.enter="sendMessage()"
            :disabled="isLoading"
            placeholder="Ask about returns, orders, or support..." 
            class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 pr-32 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all placeholder:text-slate-600 text-sm disabled:opacity-50"
          />
          <div class="absolute right-2 top-2 flex gap-2">
            <button 
              @click="sendMessage()"
              :disabled="isLoading || !userInput.trim()"
              class="bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 text-white px-6 py-2 rounded-xl text-sm font-bold transition-all flex items-center gap-2 shadow-lg shadow-indigo-600/20"
            >
              <span x-text="isLoading ? 'Wait...' : 'Send'"></span>
              <i data-lucide="send" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
        <p class="text-center text-[10px] text-slate-600 mt-4 font-medium uppercase tracking-widest">
          End-to-end encrypted AI Support Environment
        </p>
      </footer>
    </div>

    <!-- Details Sidebar (Drawer) -->
    <aside 
      x-show="drawerOpen"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 translate-x-12"
      x-transition:enter-end="opacity-100 translate-x-0"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100 translate-x-0"
      x-transition:leave-end="opacity-0 translate-x-12"
      class="w-80 glass rounded-3xl overflow-hidden hidden lg:flex flex-col shadow-2xl"
      x-cloak
    >
      <header class="p-6 border-b border-white/5 bg-white/5">
        <h2 class="font-bold flex items-center gap-2">
          <i data-lucide="activity" class="w-4 h-4 text-fuchsia-400"></i>
          Session Context
        </h2>
      </header>
      <div class="p-6 space-y-8 overflow-y-auto">
        <!-- Session ID -->
        <section>
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 block">Current Thread</label>
          <div class="flex items-center justify-between bg-white/5 p-3 rounded-xl border border-white/10">
            <code class="text-xs text-indigo-300" x-text="threadId"></code>
            <button @click="copyThread()" class="hover:text-white transition-colors">
              <i data-lucide="copy" class="w-3.5 h-3.5"></i>
            </button>
          </div>
        </section>

        <!-- Live Intelligence -->
        <section>
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 block">Extracted Context</label>
          <div class="space-y-3">
            <div class="bg-indigo-500/5 border border-indigo-500/10 p-3 rounded-xl flex items-center justify-between">
              <span class="text-xs font-medium text-slate-300">Last Intent</span>
              <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest" x-text="lastIntent || 'Searching...'"></span>
            </div>
            <div class="bg-emerald-500/5 border border-emerald-500/10 p-3 rounded-xl flex items-center justify-between">
              <span class="text-xs font-medium text-slate-300">Active Order</span>
              <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest" x-text="lastOrderId || 'None'"></span>
            </div>
          </div>
        </section>

        <!-- Status Card -->
        <section class="bg-gradient-to-br from-indigo-600/20 to-fuchsia-600/20 p-4 rounded-2xl border border-white/10">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center">
              <i data-lucide="shield-check" class="w-5 h-5 text-indigo-400"></i>
            </div>
            <span class="text-sm font-bold">Secure Access</span>
          </div>
          <p class="text-[10px] leading-relaxed text-slate-400">Your session is being monitored by our PII scrubbers to ensure your personal data remains private.</p>
        </section>
      </div>
    </aside>
  </div>

  <script>
    function chatApp() {
      return {
        threadId: '',
        userInput: '',
        messages: [],
        isLoading: false,
        drawerOpen: true,
        lastIntent: '',
        lastOrderId: '',
        
        init() {
          this.threadId = this.generateId();
          this.messages = [{
            role: 'agent',
            content: "Hi! I'm your e-commerce support agent. Ask me about order status, returns, refunds, or cancellations.",
            timestamp: this.now()
          }];
          lucide.createIcons();
          
          // Re-trigger icon updates after template changes
          this.$watch('messages', () => this.$nextTick(() => lucide.createIcons()));
        },

        generateId() {
          return 'thread-' + Math.random().toString(36).substr(2, 9);
        },

        now() {
          return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        },

        newSession() {
          this.threadId = this.generateId();
          this.messages = [{
            role: 'agent',
            content: "Hi! I'm your e-commerce support agent. Ask me about order status, returns, refunds, or cancellations.",
            timestamp: this.now()
          }];
          this.lastIntent = '';
          this.lastOrderId = '';
        },

        copyThread() {
          navigator.clipboard.writeText(this.threadId);
          // Optional: add a toast here
        },

        renderMarkdown(text) {
          if (!text) return '';
          let html = text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");

          html = html.replace(/\*\*(.+?)\*\*/g, '<strong class="font-bold text-indigo-300">$1</strong>');
          html = html.replace(/^(\d+)\.\s+/gm, '<br><strong class="text-fuchsia-400">$1.</strong> ');
          html = html.replace(/\n/g, '<br>');
          html = html.replace(/^(<br>)+/, '');
          return html;
        },

        async sendMessage() {
          const text = this.userInput.trim();
          if (!text || this.isLoading) return;

          this.userInput = '';
          this.isLoading = true;
          
          // Add User Message
          this.messages.push({
            role: 'user',
            content: text,
            timestamp: this.now()
          });

          this.scrollToBottom();

          // Placeholder for AI response
          const aiMessageIndex = this.messages.length;
          this.messages.push({
            role: 'agent',
            content: '',
            timestamp: this.now(),
            streaming: true,
            metadata: null,
            isEscalated: false
          });

          let fullText = '';
          let metadata = {};

          try {
            const response = await fetch('/chat/stream', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: text, thread_id: this.threadId })
            });

            if (!response.ok) {
              const errorData = await response.json().catch(() => ({}));
              fullText = errorData.detail || `Request failed (${response.status}).`;
            } else {
              const reader = response.body.getReader();
              const decoder = new TextDecoder();

              while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const lines = decoder.decode(value).split('\n\n');
                for (const line of lines) {
                  const trimmed = line.trim();
                  if (trimmed.startsWith('data: ')) {
                    try {
                      const data = JSON.parse(trimmed.slice(6));
                      if (data.token) {
                        fullText += data.token;
                        this.messages[aiMessageIndex].content = fullText;
                        this.scrollToBottom();
                      }
                      if (data.done) {
                        metadata = data;
                      }
                    } catch (e) {}
                  }
                }
              }
            }
          } catch (e) {
            fullText = 'Connection error. Please try again.';
          }

          // Finalize
          if (!fullText.trim()) fullText = 'Sorry, I could not process your request.';
          
          this.messages[aiMessageIndex].streaming = false;
          this.messages[aiMessageIndex].content = fullText;
          this.messages[aiMessageIndex].metadata = metadata;
          this.messages[aiMessageIndex].isEscalated = metadata.escalated === true;
          
          if (metadata.intent) this.lastIntent = metadata.intent;
          if (metadata.order_id && metadata.order_id !== 'null') this.lastOrderId = metadata.order_id;
          
          this.isLoading = false;
          this.scrollToBottom();
        },

        scrollToBottom() {
          this.$nextTick(() => {
            const box = this.$refs.messagesBox;
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
          });
        }
      }
    }
  </script>
</body>
</html>

</body>
</html>
