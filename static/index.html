<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Commerce Support Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-container { width: 100%; max-width: 700px; height: 90vh; background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { background: #1a73e8; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .chat-header .avatar { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .chat-header h2 { font-size: 16px; }
    .chat-header p { font-size: 12px; opacity: 0.85; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .message.user { align-self: flex-end; background: #1a73e8; color: white; border-bottom-right-radius: 4px; }
    .message.agent { align-self: flex-start; background: #f1f3f4; color: #202124; border-bottom-left-radius: 4px; }
    .message.escalated { background: #fce8e6; color: #c5221f; border-left: 4px solid #c5221f; }
    .message .meta { font-size: 11px; opacity: 0.6; margin-top: 4px; }
    .chat-input { padding: 16px; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
    .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #dadce0; border-radius: 24px; font-size: 14px; outline: none; }
    .chat-input input:focus { border-color: #1a73e8; }
    .chat-input button { background: #1a73e8; color: white; border: none; border-radius: 24px; padding: 10px 20px; cursor: pointer; font-size: 14px; }
    .chat-input button:disabled { background: #dadce0; cursor: not-allowed; }
    .thread-bar { padding: 8px 20px; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; font-size: 12px; color: #5f6368; display: flex; justify-content: space-between; }
    .thread-bar span { font-weight: 600; color: #1a73e8; }
    .cursor { display: inline-block; width: 8px; height: 14px; background: #1a73e8; margin-left: 2px; animation: blink 0.8s infinite; vertical-align: middle; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🛒</div>
    <div>
      <h2>E-Commerce Support Agent</h2>
      <p>Powered by LangGraph + GPT-4o-mini</p>
    </div>
  </div>
  <div class="thread-bar">
    Session ID: <span id="thread-id"></span>
    <button onclick="newSession()" style="background:none;border:none;color:#1a73e8;cursor:pointer;font-size:12px;">New Session</button>
  </div>
  <div class="chat-messages" id="messages">
    <div class="message agent">Hi! I'm your e-commerce support agent. How can I help you today? You can ask about your order status, returns, refunds, or cancellations.</div>
  </div>
  <div class="chat-input">
    <input type="text" id="user-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()" />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  let threadId = generateId();
  document.getElementById('thread-id').textContent = threadId;

  function generateId() {
    return 'thread-' + Math.random().toString(36).substr(2, 9);
  }

  function newSession() {
    threadId = generateId();
    document.getElementById('thread-id').textContent = threadId;
    document.getElementById('messages').innerHTML = '<div class="message agent">Hi! I\'m your e-commerce support agent. How can I help you today?</div>';
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const messages = document.getElementById('messages');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    btn.disabled = true;

    messages.innerHTML += `<div class="message user">${text}</div>`;

    const agentDiv = document.createElement('div');
    agentDiv.className = 'message agent';
    agentDiv.id = 'streaming-msg';
    agentDiv.innerHTML = '<span class="cursor"></span>';
    messages.appendChild(agentDiv);
    messages.scrollTop = messages.scrollHeight;

    let fullText = '';

    try {
      const params = new URLSearchParams({ message: text, thread_id: threadId });
      const response = await fetch(`/chat/stream?${params}`);
      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split('\n\n');
        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith('data: ')) {
            try {
              const data = JSON.parse(trimmed.slice(6));
              if (data.token) {
                fullText += data.token;
                agentDiv.innerHTML = fullText + '<span class="cursor"></span>';
                messages.scrollTop = messages.scrollHeight;
              }
              if (data.done) {
                agentDiv.innerHTML = fullText;
                agentDiv.id = '';
              }
              if (data.error) {
                agentDiv.textContent = 'Something went wrong.';
                agentDiv.id = '';
              }
            } catch(e) {}
          }
        }
      }
    } catch(e) {
      agentDiv.textContent = 'Connection error. Please try again.';
      agentDiv.id = '';
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
